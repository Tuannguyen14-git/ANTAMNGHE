databases:
  - name: antamnghe-db
    databaseName: antamnghe
    user: antamnghe

services:
  - type: web
    name: antamnghe-api
    runtime: docker
    dockerfilePath: ./Backend/AntamNghe/Dockerfile
    dockerContext: ./Backend
    healthCheckPath: /healthz
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Database__RunMigrationsOnStartup
        value: true
      - key: Jwt__Issuer
        value: AntamNghe
      - key: Jwt__Key
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: antamnghe-db
          property: connectionString